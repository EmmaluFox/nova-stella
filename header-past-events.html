<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Header Past Events</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bubbler+One&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body{
      margin:0;
      background:#0a0a0a;
      font-family:'Space Grotesk',system-ui,-apple-system,'Segoe UI',Roboto,Arial;
    }
    h1{
      margin:0;
      padding: 3rem 0 1rem !important;
      color: #ffffff !important;
      font-family: 'Space Grotesk', sans-serif !important;
      font-size: 2.5rem !important;
      font-weight: 400 !important;
      letter-spacing: 2px !important;
      white-space: nowrap !important;
      line-height: 1 !important;
      text-align:center;
    }
    @media (max-width: 640px) {
      h1{
        font-size: 1.25rem !important;
        padding: 2rem 0 0rem !important;
        letter-spacing: 1px !important;
      }
    }
  </style>
</head>
<body>
  <h1>Past Events</h1>
</body>
</html>
